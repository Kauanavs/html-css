<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 2</title>
    <style>
    h1 {
        text-align: center;
    }
    
    .container-videos {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 20px;
        max-width: 1000px;
        margin: 0 auto;
    }
    
    .video-item {
        text-align: center;
    }
    
    .video-item iframe {
        width: 100%;
        height: 300px;
        border-radius: 8px;
    }
    
    .btn-voltar {
        background-color: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin: 20px;
    }
    
    .btn-voltar:hover {
        background-color: #0056b3;
    }
</style>
</head>
<body>
 <button class="btn-voltar" onclick="history.back()">← Voltar</button>
 <h1>Videos legais para assistir</h1>
 
 <div class="container-videos">
    <div class="video-item">
        <h3>Vídeo 1</h3>
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
    </div>
    
    <div class="video-item">
        <h3>Vídeo 2</h3>
        <iframe src="https://www.youtube.com/embed/9bZkp7q19f0" frameborder="0" allowfullscreen></iframe>
    </div>
    
    <div class="video-item">
        <h3>Vídeo 3</h3>
        <iframe src="https://www.youtube.com/embed/jNQXAC9IVRw" frameborder="0" allowfullscreen></iframe>
    </div>
    
    <div class="video-item">
        <h3>Vídeo 4</h3>
        <iframe src="https://www.youtube.com/embed/Z0D108qBWTQ" frameborder="0" allowfullscreen></iframe>
    </div>
 </div>

 




</html>
