<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif
        }
        a {
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: purple;
        }
        a:hover{
            color: red;
            text-decoration: underline;
        }
        a:active{
            color: orange;
        }
    </style>
</head>
<body>
    <h1>Links</h1>
    <ul>
        <li><a href="https://github.com">GitHub</a></li>
        <li><a href="https://youtube.com">Canal</a></li>
        <li><a href="https://site.com">Site</a></li>
    </ul>
    
</body>
</html>
